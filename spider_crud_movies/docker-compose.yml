services:
  db:
    image: postgres:16-alpine
    container_name: spider_crud_moviesdb
    environment:
      - POSTGRES_USER=spider
      - POSTGRES_PASSWORD=spider
      - POSTGRES_DB=spider_crud_moviesdb
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spider"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
